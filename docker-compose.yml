version: "3"
services:
  website:
    build: ./website
    depends_on:
      - projectinfo-service
    ports:
      # Port here should be mapped to port 80 in the container.
      - "${WEBSITE_PORT}:80"
  projectinfo-service:
    build: ./projectinfo
    ports:
      # Port here should be mapped to the projectinfo server port
      - ${PROJECTINFO_PORT}:80
    volumes:
      - ${PROJECTINFO_CONFIG_VOLUME}
    environment:
      - PROJECTINFO_CONFIG_FILE=${PROJECTINFO_CONFIG_FILE}