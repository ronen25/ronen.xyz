version: "3"
services:
  website:
    build: ./website
    depends_on:
      - projectinfo-service
    ports:
      - "${WEBSITE_PORT}:80"
    volumes:
      - ${WEBSITE_CV_FILES}:/var/www/files
      - ${NGINX_CONF_PATH}:/etc/nginx/conf.d
      - /etc/letsencrypt:/etc/letsencrypt
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped

  projectinfo-service:
    build: ./projectinfo
    ports:
      - ${PROJECTINFO_PORT}:80
    volumes:
      - ${PROJECTINFO_CONFIG_VOLUME}
    environment:
      - PROJECTINFO_CONFIG_FILE=${PROJECTINFO_CONFIG_FILE}
